name: Build Unity Package

on: 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Read package.json & Set Environment Variables
        run: |
          PACKAGE_NAME=$(jq -r '.name' package.json)
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          
          echo "packageName=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "unityPackage=${PACKAGE_NAME}-${PACKAGE_VERSION}.unitypackage" >> $GITHUB_ENV
      
      - name: Make Package Folder
        run: |
          mkdir Packages
          mkdir Packages/${{ env.packageName }}
          ls | grep -v Packages | xargs mv -t Packages/${{ env.packageName }}
              
      - name: Track Package Meta Files
        run: find "Packages/${{ env.packageName }}/" -name \*.meta >> metaList

      - name: Create UnityPackage
        uses: pCYSl5EDgo/create-unitypackage@1.2.3
        with:
          package-path: ${{ env.unityPackage }}
          include-files: metaList
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          archive: false
          path: ${{ env.unityPackage }}
